name: Production Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/php/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_REVISION=${{ github.sha }}

      - name: Checkout infrastructure-mikrus for shared roles
        uses: actions/checkout@v4
        with:
          repository: mleczakm/infrastructure-mikrus
          path: infrastructure-mikrus
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          pip install -r infrastructure-mikrus/requirements.txt
          ansible-galaxy install -r infrastructure-mikrus/ansible-collections-requirements.yml

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Mikrus
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbooks/deploy.yml \
            --extra-vars "app_version=${{ github.ref_name }} mikrus_ipv4=${{ secrets.MIKRUS_IPV4 }}" \
            --extra-vars "cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            --extra-vars "cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            --extra-vars "cytrus_api_token=${{ secrets.CYTRUS_API_TOKEN }}" \
            --extra-vars "ansible_host=${{ secrets.MIKRUS_IPV4 }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          ANSIBLE_ROLES_PATH: ./infrastructure-mikrus/ansible/roles

      
